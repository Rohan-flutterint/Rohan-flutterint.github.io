    /* =================== THEME TOKENS =================== */
    :root {
      /* hacker (default) */
      --bg: #050B06;              /* deep black-green */
      --fg: #C9FFD7;              /* pale mint text */
      --accent: #31FF74;          /* neon green */
      --dim: #6aff9a;             /* dimmer green */
      --link: #59ffa3;            /* link green */
      --shadow: 0 0 8px rgba(49,255,116,.55), 0 0 24px rgba(49,255,116,.25);
    }
    .theme-dark {
      --bg: #0b0f14;
      --fg: #e6edf3;
      --accent: #3fb950;
      --dim: #8b949e;
      --link: #58a6ff;
      --shadow: 0 0 8px rgba(63,185,80,.35);
    }
    .theme-light {
      --bg: #f6f8fa;
      --fg: #0b0f14;
      --accent: #1f6feb;
      --dim: #57606a;
      --link: #0969da;
      --shadow: none;
    }

    /* =================== LAYOUT =================== */
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: "VT323", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow: hidden; /* keep matrix canvas fixed */
    }
    #matrix {
      position: fixed; inset: 0;
      z-index: 0; /* behind terminal */
      display: block;
    }
    #app {
      position: relative; z-index: 2;
      height: 100%;
      filter: drop-shadow(0 0 0.25rem rgba(49,255,116,0.3));
    }

    /* CRT fx: vignette + scanlines + subtle flicker */
    .crt::before, .crt::after {
      content: ""; pointer-events: none; position: fixed; inset: 0; z-index: 1;
    }
    .crt::before {
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.85) 100%);
      mix-blend-mode: overlay;
    }
    .crt::after {
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0.12) 0px,
          rgba(0,0,0,0.12) 2px,
          rgba(0,0,0,0.08) 3px,
          rgba(0,0,0,0.08) 4px
        );
      animation: scan 9s linear infinite, flicker 2.2s infinite steps(60);
      opacity: .35;
    }
    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    @keyframes flicker {
      0%, 19%, 21%, 23%, 80%, 100% { opacity: .35; }
      20%, 22% { opacity: .25; }
      24% { opacity: .38; }
    }

    /* jQuery Terminal overrides */
    .terminal, .cmd {
      font-size: 20px; line-height: 1.35;
      text-shadow: var(--shadow);
      color: var(--fg);
    }
    .terminal {
      background: transparent !important;
    }
    .terminal .prompt { color: var(--accent); }
    .terminal .cursor {
      background: var(--accent) !important;
      box-shadow: 0 0 8px var(--accent), 0 0 18px rgba(49,255,116,.6);
    }
    .terminal a { color: var(--link); text-decoration: none; border-bottom: 1px dotted currentColor; }
    .terminal a:hover { text-decoration: underline; }
    ::selection { background: rgba(49,255,116,.35); color: #08150d; }

    /* Subtle welcome toast */
    .hint {
      position: absolute; inset: auto 1rem 1rem auto; z-index: 3;
      color: var(--dim); opacity: .9; font-size: 16px; user-select: none;
      text-shadow: var(--shadow);
      background: rgba(0,0,0,.25); border: 1px solid rgba(49,255,116,.25);
      padding: .35rem .55rem; border-radius: .5rem; backdrop-filter: blur(3px);
    }
  </style>

    /* =================== MATRIX RAIN =================== */
    (function matrix() {
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");
      let w, h, columns, drops;

      const glyphs = "アイウエオカキクケコｱｲｳｴｵｶｷｸｹｺ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const glyphArr = glyphs.split("");

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        const fontSize = 18;                // matrix glyph size
        columns = Math.floor(w / fontSize); // number of columns
        drops = new Array(columns).fill(0).map(() => Math.random() * -100); // start above screen
        ctx.font = fontSize + "px VT323, monospace";
      }
      window.addEventListener("resize", resize, { passive: true });
      resize();

      function draw() {
        // translucent clear to create trailing effect
        ctx.fillStyle = "rgba(5,11,6,0.08)";
        ctx.fillRect(0, 0, w, h);

        // draw glyphs
        ctx.fillStyle = "#31FF74";
        for (let i = 0; i < drops.length; i++) {
          const text = glyphArr[Math.floor(Math.random() * glyphArr.length)];
          const x = i * 18;
          const y = drops[i] * 18;
          ctx.fillText(text, x, y);

          // reset drop randomly after it passes bottom
          if (y > h && Math.random() > 0.975) drops[i] = 0;
          drops[i] += (Math.random() * 0.8) + 0.6; // variable speed
        }
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
